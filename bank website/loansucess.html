<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loan Application Successful</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f4f6f9;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Box */
.success-box {
    background: white;
    padding: 35px;
    border-radius: 12px;
    text-align: center;
    width: 420px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* Icon */
.success-icon {
    font-size: 60px;
    color: green;
}

/* Details */
.details {
    margin-top: 15px;
    font-size: 15px;
    color: #333;
}

/* Button */
.back-btn {
    margin-top: 20px;
    padding: 10px 20px;
    background: #0d6efd;
    color: white;
    border: none;
    border-radius: 6px;
}
</style>

</head>

<body>

<div class="success-box">

<div class="success-icon">✔</div>

<h2>Loan Application Submitted!</h2>
<p>Your loan request has been successfully received.</p>

<div id="details" class="details"></div>

<button class="back-btn" onclick="goBack()">Back to Loans</button>

</div>

<script>
// Get data
let data = JSON.parse(localStorage.getItem("applicationData"));
let loanType = localStorage.getItem("loanType");

// Show details
if(data){
    document.getElementById("details").innerHTML = `
        <b>Application ID:</b> ${data.applicationId}<br>
        <b>Name:</b> ${data.name}<br>
        <b>Email:</b> ${data.email}<br>
        <b>Loan Type:</b> ${loanType}
    `;
}

// Back button
function goBack(){
    window.location.href = "loans.html";
}

// Auto redirect after 5 sec
setTimeout(goBack, 5000);

// Clear storage (optional)
localStorage.removeItem("applicationData");
localStorage.removeItem("loanType");
</script>

</body>
</html>
