<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Open Account - Apex Bank</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f4f6f9;
    font-family: Arial;
}

/* Form Container */
.form-container {
    max-width: 700px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

/* Title */
.form-container h2 {
    text-align: center;
    margin-bottom: 20px;
    font-weight: bold;
}

/* Section headings */
.form-section {
    margin-top: 25px;
    font-weight: 600;
    color: #0d6efd;
}

/* Button */
.submit-btn {
    background: #ff3b30;
    color: white;
    padding: 12px;
    border: none;
    border-radius: 8px;
    width: 100%;
    margin-top: 20px;
    font-size: 16px;
}
</style>

</head>

<body>

<div class="form-container">

<h2>Open Savings Account</h2>

<form id="applyForm">

<!-- PERSONAL DETAILS -->
<div class="form-section">Personal Details</div>

<div class="row">
<div class="col-md-6">
<input class="form-control mb-3" placeholder="First Name" required>
</div>
<div class="col-md-6">
<input class="form-control mb-3" placeholder="Last Name" required>
</div>
</div>

<input class="form-control mb-3" placeholder="Email Address" type="email" required>
<input class="form-control mb-3" placeholder="Phone Number" required>

<div class="row">
<div class="col-md-6">
<input class="form-control mb-3" type="date" required>
</div>
<div class="col-md-6">
<select class="form-control mb-3" required>
<option>Gender</option>
<option>Male</option>
<option>Female</option>
</select>
</div>
</div>

<!-- ADDRESS -->
<div class="form-section">Address Details</div>

<textarea class="form-control mb-3" placeholder="Full Address" required></textarea>

<div class="row">
<div class="col-md-6">
<input class="form-control mb-3" placeholder="City" required>
</div>
<div class="col-md-6">
<input class="form-control mb-3" placeholder="Pincode" required>
</div>
</div>

<!-- ACCOUNT TYPE -->
<div class="form-section">Account Details</div>

<select class="form-control mb-3" required>
<option>Select Account Type</option>
<option>Savings Account</option>
<option>Current Account</option>
</select>

<select class="form-control mb-3">
<option>Select Branch</option>
<option>Hyderabad</option>
<option>Vijayawada</option>
<option>Visakhapatnam</option>
</select>

<!-- TERMS -->
<div class="form-check mt-3">
<input class="form-check-input" type="checkbox" required>
<label class="form-check-label">
I agree to the terms and conditions
</label>
</div>

<button type="submit" class="submit-btn">Submit Application</button>

</form>

</div>

<script>
document.getElementById("applyForm").addEventListener("submit", function(e){
    e.preventDefault();

    // redirect to success page
    window.location.href = "succes.html";
});
</script>

</body>
</html>
