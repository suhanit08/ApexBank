<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Accounts Info</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* SAME CSS (reuse for all pages) */
body {
    font-family: Arial;
    background: linear-gradient(135deg, #e3f2fd, #ffffff);
}

.info-box {
    max-width: 850px;
    margin: 60px auto;
    background: white;
    padding: 40px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.1);
}

.info-box ul {
    list-style: none;
    padding: 0;
    text-align: left;
}

.info-box ul li {
    padding: 10px;
    margin-bottom: 8px;
    background: #f8f9fa;
    border-radius: 8px;
}

.btn { margin: 10px; }
</style>
</head>

<body>

<div class="info-box">

<h2>🏦 Bank Accounts</h2>

<p>Choose the right account for your financial needs.</p>

<ul>
<li>✔ Savings Account – earn interest</li>
<li>✔ Current Account – for businesses</li>
<li>✔ Salary Account – zero balance</li>
</ul>

<button class="btn btn-danger" onclick="location.href='login.html'">Apply Now</button>
<button class="btn btn-primary" onclick="location.href='accounts.html'">Go to Accounts</button>

</div>

</body>
</html>
