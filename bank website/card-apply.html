<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apply Card</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f4f6f9; font-family: Arial; }

.form-box {
    max-width: 600px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
}
</style>
</head>

<body>

<div class="form-box">

<h2>Card Application</h2>

<form id="cardForm">

<input id="name" class="form-control mb-3" placeholder="Full Name" required>
<input id="email" class="form-control mb-3" placeholder="Email" required>

<input id="cardType" class="form-control mb-3" readonly>

<input class="form-control mb-3" placeholder="Annual Income">
<input class="form-control mb-3" placeholder="Occupation">

<button class="btn btn-danger w-100">Submit</button>

</form>

</div>

<script>
let type = localStorage.getItem("cardType");
document.getElementById("cardType").value = type;

document.getElementById("cardForm").addEventListener("submit", function(e){
    e.preventDefault();

    let appId = "CARD" + Math.floor(Math.random()*100000);

    let data = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        type: "Card",
        applicationId: appId
    };

    localStorage.setItem("applicationData", JSON.stringify(data));

    window.location.href = "card-succes.html";
});
</script>

</body>
</html>
