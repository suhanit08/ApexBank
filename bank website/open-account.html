<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Open Account</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f4f6f9; font-family: Arial; }

.form-box {
    max-width: 700px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
}

.section-title {
    margin-top: 20px;
    font-weight: bold;
    color: #0d6efd;
}
</style>
</head>

<body>

<div class="form-box">

<h2 id="title">Open Account</h2>

<form id="mainForm">

<!-- COMMON -->
<div class="section-title">Personal Details</div>

<input id="name" class="form-control mb-3" placeholder="Full Name" required>
<input id="email" class="form-control mb-3" placeholder="Email" required>
<input class="form-control mb-3" placeholder="Phone Number">

<!-- DYNAMIC SECTION -->
<div id="dynamicFields"></div>

<button class="btn btn-danger w-100">Submit</button>

</form>

</div>

<script>
let type = localStorage.getItem("productType");
document.getElementById("title").innerText = type + " Application";

// Dynamic fields
let dynamic = document.getElementById("dynamicFields");

if(type === "Savings"){
    dynamic.innerHTML = `
        <div class="section-title">Savings Details</div>
        <input class="form-control mb-3" placeholder="Initial Deposit">
    `;
}

else if(type === "Current"){
    dynamic.innerHTML = `
        <div class="section-title">Business Details</div>
        <input class="form-control mb-3" placeholder="Business Name">
        <input class="form-control mb-3" placeholder="GST Number">
    `;
}

else if(type === "Card"){
    dynamic.innerHTML = `
        <div class="section-title">Card Details</div>
        <input class="form-control mb-3" placeholder="Annual Income">
        <input class="form-control mb-3" placeholder="Occupation">
    `;
}

// Submit
document.getElementById("mainForm").addEventListener("submit", function(e){
    e.preventDefault();

    let appId = "APP" + Math.floor(Math.random()*100000);

    let data = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        type: type,
        applicationId: appId
    };

    localStorage.setItem("applicationData", JSON.stringify(data));

    window.location.href = "success.html";
});
</script>

</body>
</html>
