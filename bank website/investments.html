<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Investments - Apex Bank</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { font-family: Arial; background: #f4f6f9; }

.bank-nav { background: #0d47a1; }

/* Hero */
.invest-hero {
    min-height: 300px;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('inv.jpg');
    background-size: cover;
    background-position: center;
    color: white;

    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

/* Cards */
.invest-card {
    background: white;
    padding: 25px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.invest-card:hover {
    transform: translateY(-8px);
}

.apply-btn {
    background: #ff3b30;
    color: white;
    padding: 10px 18px;
    border: none;
    border-radius: 6px;
}
</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bank-nav">
<div class="container">
<a class="navbar-brand" href="index.html">Apex BANK</a>
</div>
</nav>

<!-- HERO -->
<section class="invest-hero">
<div>
<h1>Investments</h1>
<p>Grow your wealth with smart investment options</p>
</div>
</section>

<!-- OPTIONS -->
<section class="container py-5">
<div class="row g-4">

<div class="col-md-4">
<div class="invest-card">
<h4>Fixed Deposit</h4>
<p>Safe investment with guaranteed returns.</p>
<button onclick="goToApply('FD')" class="apply-btn">Apply</button>
</div>
</div>

<div class="col-md-4">
<div class="invest-card">
<h4>Mutual Funds</h4>
<p>Invest in diversified portfolios.</p>
<button onclick="goToApply('Mutual Fund')" class="apply-btn">Apply</button>
</div>
</div>

<div class="col-md-4">
<div class="invest-card">
<h4>Gold Investment</h4>
<p>Secure your future with gold savings.</p>
<button onclick="goToApply('Gold')" class="apply-btn">Apply</button>
</div>
</div>

</div>
</section>

<script>
function goToApply(type){
    localStorage.setItem("investType", type);
    window.location.href = "invest-apply.html";
}
</script>

</body>
</html>
