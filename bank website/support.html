<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Support - Apex Bank</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { font-family: Arial; background: #f4f6f9; }

.bank-nav { background: #0d47a1; }

/* Hero */
.support-hero {
    min-height: 250px;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('support.jpg');
    background-size: cover;
    background-position: center;
    color: white;

    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

/* Cards */
.support-card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* Form */
.form-box {
    background: white;
    padding: 25px;
    border-radius: 12px;
    margin-top: 20px;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bank-nav">
<div class="container">
<a class="navbar-brand" href="index.html">Apex BANK</a>
</div>
</nav>

<!-- HERO -->
<section class="support-hero">
<div>
<h1>Customer Support</h1>
<p>We are here to help you 24/7</p>
</div>
</section>

<!-- SUPPORT OPTIONS -->
<section class="container py-5">
<div class="row g-4">

<div class="col-md-4">
<div class="support-card">
<h4>📞 Call Us</h4>
<p>1800-123-456</p>
</div>
</div>

<div class="col-md-4">
<div class="support-card">
<h4>📧 Email</h4>
<p>support@apexbank.com</p>
</div>
</div>

<div class="col-md-4">
<div class="support-card">
<h4>💬 Live Chat</h4>
<p>Available 24/7</p>
</div>
</div>

</div>
</section>

<!-- CONTACT FORM -->
<section class="container mb-5">
<div class="form-box">

<h3>Send Us a Message</h3>

<form id="supportForm">

<input class="form-control mb-3" placeholder="Full Name" required>
<input class="form-control mb-3" placeholder="Email" required>
<textarea class="form-control mb-3" placeholder="Your Message" required></textarea>

<button class="btn btn-primary w-100">Submit</button>

</form>

</div>
</section>

<!-- FAQ -->
<section class="container mb-5">
<h3>Frequently Asked Questions</h3>

<div class="accordion" id="faq">

<div class="accordion-item">
<h2 class="accordion-header">
<button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#q1">
How to open an account?
</button>
</h2>
<div id="q1" class="accordion-collapse collapse show">
<div class="accordion-body">
You can open an account online through our website.
</div>
</div>
</div>

<div class="accordion-item">
<h2 class="accordion-header">
<button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#q2">
How to apply for a loan?
</button>
</h2>
<div id="q2" class="accordion-collapse collapse">
<div class="accordion-body">
Go to Loans section and apply online.
</div>
</div>
</div>

</div>
</section>

<script>
document.getElementById("supportForm").addEventListener("submit", function(e){
    e.preventDefault();
    alert("Your message has been sent!");
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
