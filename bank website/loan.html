<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loans - Apex Bank</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { font-family: Arial; background: #f4f6f9; }

/* Navbar */
.bank-nav { background: #0d47a1; }

/* Hero */
.loan-hero {
    min-height: 350px;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('loan.jpg');
    background-size: cover;
    background-position: center;
    color: white;

    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

/* Cards */
.loan-card {
    background: white;
    padding: 25px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.loan-card:hover {
    transform: translateY(-8px);
}

.loan-btn {
    background: #ff3b30;
    color: white;
    padding: 10px 18px;
    border: none;
    border-radius: 6px;
}
</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bank-nav">
<div class="container">
<a class="navbar-brand" href="index.html">Apex BANK</a>
</div>
</nav>

<!-- HERO -->
<section class="loan-hero">
<div>
<h1>Loans Made Easy</h1>
<p>Get instant loans with low interest rates</p>
</div>
</section>

<!-- LOANS -->
<section class="container py-5">
<div class="row g-4">

<div class="col-md-4">
<div class="loan-card">
<h4>Personal Loan</h4>
<p>Quick loans for your personal needs.</p>
<button onclick="goToApply('Personal Loan')" class="loan-btn">Apply</button>
</div>
</div>

<div class="col-md-4">
<div class="loan-card">
<h4>Home Loan</h4>
<p>Turn your dream home into reality.</p>
<button onclick="goToApply('Home Loan')" class="loan-btn">Apply</button>
</div>
</div>

<div class="col-md-4">
<div class="loan-card">
<h4>Car Loan</h4>
<p>Drive your dream car today.</p>
<button onclick="goToApply('Car Loan')" class="loan-btn">Apply</button>
</div>
</div>

</div>
</section>
<script>
function goToApply(type){
    localStorage.setItem("loanType", type);
    window.location.href = "loan-apply.html";
}
</script>

</body>
</html>
