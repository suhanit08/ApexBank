<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apply Current Account - Apex Bank</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f4f6f9;
    font-family: Arial;
}

.form-container {
    max-width: 750px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

.form-container h2 {
    text-align: center;
    margin-bottom: 20px;
}

.section-title {
    margin-top: 25px;
    font-weight: 600;
    color: #0d6efd;
}

.submit-btn {
    background: #ff3b30;
    color: white;
    padding: 12px;
    border: none;
    border-radius: 8px;
    width: 100%;
    margin-top: 20px;
}
</style>

</head>

<body>

<div class="form-container">

<h2>Open Current Account</h2>

<form id="currentForm">

<!-- BUSINESS DETAILS -->
<div class="section-title">Business Details</div>

<input class="form-control mb-3" placeholder="Business Name" required>
<input class="form-control mb-3" placeholder="GST Number" required>

<select class="form-control mb-3" required>
<option>Business Type</option>
<option>Proprietorship</option>
<option>Partnership</option>
<option>Private Limited</option>
</select>

<!-- OWNER DETAILS -->
<div class="section-title">Owner Details</div>

<div class="row">
<div class="col-md-6">
<input class="form-control mb-3" placeholder="First Name" required>
</div>
<div class="col-md-6">
<input class="form-control mb-3" placeholder="Last Name" required>
</div>
</div>

<input class="form-control mb-3" placeholder="Email" type="email" required>
<input class="form-control mb-3" placeholder="Phone Number" required>

<!-- ADDRESS -->
<div class="section-title">Business Address</div>

<textarea class="form-control mb-3" placeholder="Full Address" required></textarea>

<div class="row">
<div class="col-md-6">
<input class="form-control mb-3" placeholder="City" required>
</div>
<div class="col-md-6">
<input class="form-control mb-3" placeholder="Pincode" required>
</div>
</div>

<!-- BANK DETAILS -->
<div class="section-title">Account Preferences</div>

<select class="form-control mb-3">
<option>Select Branch</option>
<option>Hyderabad</option>
<option>Vijayawada</option>
<option>Visakhapatnam</option>
</select>

<select class="form-control mb-3">
<option>Expected Monthly Transactions</option>
<option>0 - 50</option>
<option>50 - 200</option>
<option>200+</option>
</select>

<!-- TERMS -->
<div class="form-check mt-3">
<input class="form-check-input" type="checkbox" required>
<label class="form-check-label">
I agree to the terms and conditions
</label>
</div>

<button type="submit" class="submit-btn">Submit Application</button>

</form>

</div>

<script>
document.getElementById("currentForm").addEventListener("submit", function(e){
    e.preventDefault();
    window.location.href = "succes.html";
});
</script>

</body>
</html>
