<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mobile Banking</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { font-family: Arial; background:#f4f6f9; }

/* Hero */
.hero {
    background: linear-gradient(135deg, #0d6efd, #0a58ca);
    color: white;
    text-align: center;
    padding: 60px 20px;
}

/* Card */
.card-box {
    background: white;
    padding: 25px;
    border-radius: 12px;
    text-align: center;
    margin-top: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<section class="hero">
<h1>Mobile Banking</h1>
<p>Bank anytime, anywhere using your smartphone</p>
</section>

<div class="container">

<div class="card-box">
<h3>Features</h3>
<ul style="text-align:left;">
<li>✔ Check balance instantly</li>
<li>✔ Transfer money securely</li>
<li>✔ Pay bills and recharge</li>
<li>✔ Track transactions</li>
</ul>

<button class="btn btn-primary" onclick="location.href='mobilebanking-apply.html'">Login to Mobile Banking</button>
</div>

</div>

</body>
</html>
