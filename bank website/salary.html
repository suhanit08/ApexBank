<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Salary Account - Apex Bank</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { font-family: Arial; background: #f4f6f9; }

/* Navbar */
.bank-nav { background: #0d47a1; }

/* Hero */
.salary-hero {
    min-height: 350px;
    background:
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
        url('images/salary-bg.jpg');
    background-size: cover;
    background-position: center;
    color: white;

    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

/* Features */
.feature-box {
    text-align: center;
    padding: 20px;
}

/* Card */
.apply-card {
    background: white;
    padding: 30px;
    border-radius: 12px;
    margin-top: 20px;
}

.apply-btn {
    background: #ff3b30;
    color: white;
    padding: 12px 22px;
    border: none;
    border-radius: 6px;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bank-nav">
<div class="container">
<a class="navbar-brand" href="index.html">Apex BANK</a>
</div>
</nav>

<!-- HERO -->
<section class="salary-hero">
<div>
<h1>Salary Account</h1>
<p>Zero balance account with exclusive employee benefits</p>
</div>
</section>

<!-- FEATURES -->
<section class="container py-5">
<div class="row">

<div class="col-md-4 feature-box">
<h4>Zero Balance</h4>
<p>No minimum balance required.</p>
</div>

<div class="col-md-4 feature-box">
<h4>Free Debit Card</h4>
<p>Enjoy cashback and rewards.</p>
</div>

<div class="col-md-4 feature-box">
<h4>Salary Credits</h4>
<p>Automatic salary deposits.</p>
</div>

</div>
</section>

<!-- APPLY -->
<section class="container">
<div class="apply-card text-center">
<h3>Open Salary Account</h3>
<p>Quick and easy account opening for employees.</p>

<button class="apply-btn" onclick="location.href='salary-apply.html'">
Apply Now
</button>

</div>
</section>

</body>
</html>
