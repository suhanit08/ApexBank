<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apply Salary Account</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background: #f4f6f9; font-family: Arial; }

.form-container {
    max-width: 700px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
}

.section-title {
    margin-top: 20px;
    color: #0d6efd;
    font-weight: 600;
}

.submit-btn {
    background: #ff3b30;
    color: white;
    padding: 12px;
    border: none;
    border-radius: 6px;
    width: 100%;
}
</style>

</head>

<body>

<div class="form-container">

<h2>Salary Account Application</h2>

<form id="salaryForm">

<div class="section-title">Personal Details</div>

<input id="name" class="form-control mb-3" placeholder="Full Name" required>
<input id="email" type="email" class="form-control mb-3" placeholder="Email" required>
<input class="form-control mb-3" placeholder="Phone Number" required>

<div class="section-title">Employment Details</div>

<input id="company" class="form-control mb-3" placeholder="Company Name" required>
<input class="form-control mb-3" placeholder="Employee ID">
<input class="form-control mb-3" placeholder="Monthly Salary">

<div class="form-check mt-3">
<input class="form-check-input" type="checkbox" required>
<label>I agree to terms</label>
</div>

<button type="submit" class="submit-btn">Submit Application</button>

</form>

</div>

<script>
document.getElementById("salaryForm").addEventListener("submit", function(e){
    e.preventDefault();

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;

    let appId = "SAL" + Math.floor(Math.random() * 100000);

    let data = {
        name: name,
        email: email,
        applicationId: appId
    };

    localStorage.setItem("applicationData", JSON.stringify(data));

    window.location.href = "succes.html";
});
</script>

</body>
</html>
