<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>SecureBank Login</title>

<link rel="stylesheet" href="login.css">

</head>

<body>

<div class="container">

<!-- LEFT SIDE IMAGE -->
<div class="left-section">

<img src="login.jpg" alt="bank advertisement">

</div>


<!-- RIGHT SIDE LOGIN -->
<div class="right-section">

<div class="login-box">

<h2>SecureBank Login</h2>

<form id="loginForm">

<input type="text" id="username" placeholder="User ID" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit">LOGIN</button>

<p id="loginMessage"></p>

</form>

<div class="links">

<a href="#">Unlock Account</a>
<a href="#">Forgot Password</a>

</div>

<p class="signup">
Kindly <b>Sign Up</b> if you are a new user.
</p>

</div>

</div>

</div>

<script src="login.js"></script>

</body>
</html>
