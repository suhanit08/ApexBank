<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loans Info</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { font-family: Arial; background:#f4f6f9; }

.info-box {
    max-width: 800px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    text-align: center;
}
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #e3f2fd, #ffffff);
}

/* Main container */
.info-box {
    max-width: 850px;
    margin: 60px auto;
    background: white;
    padding: 40px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.info-box:hover {
    transform: translateY(-5px);
}

/* Heading */
.info-box h2 {
    font-weight: bold;
    margin-bottom: 15px;
    color: #0d47a1;
}

/* Paragraph */
.info-box p {
    color: #555;
    font-size: 16px;
    margin-bottom: 20px;
}

/* List */
.info-box ul {
    list-style: none;
    padding: 0;
    text-align: left;
}

.info-box ul li {
    padding: 10px;
    margin-bottom: 8px;
    background: #f8f9fa;
    border-radius: 8px;
    transition: 0.3s;
}

.info-box ul li:hover {
    background: #e3f2fd;
}

/* Buttons */
.btn {
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: 500;
    transition: 0.3s;
}

/* Apply button */
.btn-danger {
    background: #ff3b30;
    border: none;
}

.btn-danger:hover {
    background: #d63027;
}

/* Secondary button */
.btn-primary {
    background: #0d6efd;
    border: none;
}

.btn-primary:hover {
    background: #0a58ca;
}

/* Button spacing */
.info-box button {
    margin: 10px;
}

/* Responsive */
@media(max-width: 768px){
    .info-box {
        margin: 20px;
        padding: 25px;
    }
}
</style>
</head>

<body>

<div class="info-box">

<h2>Loans at Apex Bank</h2>

<p>
We provide Personal, Home, and Car loans with low interest rates,
fast approval, and flexible repayment options.
</p>

<ul style="text-align:left;">
<li>✔ Low Interest Rates</li>
<li>✔ Quick Approval</li>
<li>✔ Flexible EMI Options</li>
<li>✔ Minimal Documentation</li>
</ul>

<br>

<button class="btn btn-danger" onclick="goToApply()">Apply Now</button>
<button class="btn btn-primary" onclick="goToMain()">Go to Loans Section</button>

</div>

<script>
function goToApply(){
    window.location.href = "loan-apply.html";
}

function goToMain(){
    window.location.href = "loan.html";
}
</script>

</body>
</html>
