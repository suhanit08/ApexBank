<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cards - Apex Bank</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { font-family: Arial; background: #f4f6f9; }

/* Navbar */
.bank-nav { background: #0d47a1; }

/* Hero */
.cards-hero {
    min-height: 300px;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('card.jpg');
    background-size: cover;
    background-position: center;
    color: white;

    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

/* Card UI */
.card-box {
    background: white;
    padding: 25px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card-box:hover {
    transform: translateY(-8px);
}

.apply-btn {
    background: #ff3b30;
    color: white;
    padding: 10px 18px;
    border: none;
    border-radius: 6px;
}
</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bank-nav">
<div class="container">
<a class="navbar-brand" href="index.html">Apex BANK</a>
</div>
</nav>

<!-- HERO -->
<section class="cards-hero">
<div>
<h1>Our Cards</h1>
<p>Choose the perfect card for your lifestyle</p>
</div>
</section>

<!-- CARDS -->
<section class="container py-5">
<div class="row g-4">

<div class="col-md-4">
<div class="card-box">
<h4>Credit Card</h4>
<p>Enjoy rewards, cashback and easy payments.</p>
<button onclick="goToApply('Credit Card')" class="apply-btn">Apply</button>
</div>
</div>

<div class="col-md-4">
<div class="card-box">
<h4>Debit Card</h4>
<p>Access your money anytime anywhere.</p>
<button onclick="goToApply('Debit Card')" class="apply-btn">Apply</button>
</div>
</div>

<div class="col-md-4">
<div class="card-box">
<h4>Prepaid Card</h4>
<p>Safe and controlled spending option.</p>
<button onclick="goToApply('Prepaid Card')" class="apply-btn">Apply</button>
</div>
</div>

</div>
</section>

<script>
function goToApply(type){
    localStorage.setItem("cardType", type);
    window.location.href = "card-apply.html";
}
</script>

</body>
</html>
