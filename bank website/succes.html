<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Application Successful</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f4f6f9;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.success-box {
    background: white;
    padding: 35px;
    border-radius: 12px;
    text-align: center;
    width: 420px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.success-icon {
    font-size: 60px;
    color: green;
}

.details {
    margin-top: 15px;
    font-size: 15px;
}

.back-btn {
    margin-top: 20px;
    padding: 10px 20px;
    background: #0d6efd;
    color: white;
    border: none;
    border-radius: 6px;
}
</style>

</head>

<body>

<div class="success-box">

<div class="success-icon">✔</div>

<h2>Application Submitted!</h2>
<p>Your request has been successfully processed.</p>

<div id="appDetails" class="details"></div>

<button class="back-btn" onclick="goBack()">Back to Accounts</button>

</div>

<script>
let data = JSON.parse(localStorage.getItem("applicationData"));

if(data){
    document.getElementById("appDetails").innerHTML = `
        <b>Application ID:</b> ${data.applicationId}<br>
        <b>Name:</b> ${data.name || data.businessName || "User"}<br>
        <b>Email:</b> ${data.email}<br>
        <b>Account Type:</b> ${data.type || "Account"}
    `;
}

// Redirect based on account type
function goBack(){
    if(data && data.type === "Savings"){
        window.location.href = "savings.html";
    } 
    else if(data && data.type === "Current"){
        window.location.href = "current.html";
    } 
    else if(data && data.type === "Salary"){
        window.location.href = "salary.html";
    } 
    else {
        window.location.href = "accounts.html";
    }
}

// Auto redirect after 5 sec
setTimeout(goBack, 5000);

// Clear data after use
localStorage.removeItem("applicationData");
</script>

</body>
</html>
